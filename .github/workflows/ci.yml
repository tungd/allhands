name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.0

      - name: Install server deps
        run: opam install ./server --deps-only --with-test --yes

      - name: Build server
        run: dune build
        working-directory: server

      - name: Run server tests
        run: make server-test

      - name: Validate release scripts
        run: zsh -n scripts/build_server_release.sh scripts/build_server_release_docker.sh scripts/generate_release_checksums.sh

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Resolve Swift package
        working-directory: ios
        run: swift package resolve --package-path AllHandsKit

      - name: Run Swift package tests
        working-directory: ios
        run: swift test --package-path AllHandsKit

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build iOS app
        working-directory: ios
        run: xcodebuild -project AllHands.xcodeproj -scheme AllHands -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build

  validate-release-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Validate release scripts
        run: zsh -n scripts/build_server_release.sh scripts/build_server_release_docker.sh scripts/generate_release_checksums.sh

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check --config .goreleaser.yaml
