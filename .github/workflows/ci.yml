name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.0

      - name: Install server deps
        run: opam install ./server --deps-only --with-test --yes

      - name: Build server
        run: dune build
        working-directory: server

      - name: Run server tests
        working-directory: server
        run: |
          ./_build/default/test_event_mapper.exe
          ./_build/default/test_session_store.exe
          ./_build/default/test_worktree_manager.exe
          ./_build/default/test_integration.exe

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Resolve Swift package
        working-directory: ios
        run: swift package resolve --package-path AllHandsKit

      - name: Run Swift package tests
        working-directory: ios
        run: swift test --package-path AllHandsKit

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build iOS app
        working-directory: ios
        run: xcodebuild -project AllHands.xcodeproj -scheme AllHands -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build
